name: Publish data to GitHub Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"
  repository_dispatch:
    types: [publish-data]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-data
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch WARN marts
        run: ./data/scripts/fetch-warn.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: data/publish

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
