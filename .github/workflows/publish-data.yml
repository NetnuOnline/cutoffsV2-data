name: Publish data to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Data source"
        required: true
        default: gh-pages
        type: choice
        options:
          - gh-pages
          - fetch-warn
  schedule:
    - cron: "0 12 * * *"
  repository_dispatch:
    types: [publish-data]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-data
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source == 'fetch-warn' && 'main' || 'gh-pages' }}

      - uses: actions/setup-python@v5
        if: github.event_name == 'workflow_dispatch' && inputs.source == 'fetch-warn'
        with:
          python-version: "3.12"

      - name: Fetch WARN marts
        if: github.event_name != 'workflow_dispatch' || inputs.source == 'fetch-warn'
        run: |
          ./data/scripts/fetch-warn.sh
          python3 ./data/scripts/fetch-warn-airtable.py --merge-lca-only

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ github.event_name == 'workflow_dispatch' && inputs.source == 'fetch-warn' && 'data/publish' || '.' }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
